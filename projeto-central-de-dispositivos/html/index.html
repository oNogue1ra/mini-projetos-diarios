<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Dispositivos</title>
    <link rel="stylesheet" href="../styles/mobile.css" media="all">
    <link rel="stylesheet" href="../styles/tablet.css" media="screen and (min-width: 768px) and (max-width: 1024px)">
    <link rel="stylesheet" href="../styles/desktop.css" media="screen and (min-width: 1025px) and (max-width: 1200px)">
    <link rel="stylesheet" href="../styles/tv.css" media="screen and (min-width: 1201px)">
</head>
<body>
    <main>
        <h1>Central de Dispositivos</h1>
        <img class="mobile" src="../images/icon-phone.png" alt="versão para smartphone">
        <img class="tablet" src="../images/icon-tablet.png" alt="versão para tablet">
        <img class="desktop" src="../images/icon-pc.png" alt="versão para desktop">
        <img class="tv" src="../images/icon-tv.png" alt="versão para tv">

        <div id="status">
            <p class="mobile">Smartphone conectado</p>
            <p class="tablet">Tablet conectado</p>
            <p class="desktop">Desktop conectado</p>
            <p class="tv">Tv conectado</p>
        </div>

        <div id="resolução">
            <p>Resolução detectada:</p>
            <p class="mobile">375 x 767</p>
            <p class="tablet">768 x 1024</p>
            <p class="desktop">1025 x 1200</p>
            <p class="tv">1201 x 4k</p>
        </div>

        <div id="orientação">
            <p>Orientação:</p>
            <p class="mobile">Retrato</p>
            <p class="tablet">Retrato</p>
            <p class="desktop">Paisagem</p>
            <p class="tv">Paisagem</p>
        </div>

    </main>
</body>
</html>
